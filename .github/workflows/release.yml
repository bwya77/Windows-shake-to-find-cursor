name: Release

on:
  push:

permissions:
  contents: write

jobs:
  release:
    name: Build and release Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish .\ShakeToBigCursor.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o .\artifacts\publish

      - name: Package binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          Compress-Archive `
            -Path .\artifacts\publish\* `
            -DestinationPath .\artifacts\release\WindowsShakeToFindCursor-win-x64.zip `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsShakeToFindCursor-win-x64
          path: artifacts/release/WindowsShakeToFindCursor-win-x64.zip

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "build-${{ github.run_number }}"
          gh release create $tag `
            .\artifacts\release\WindowsShakeToFindCursor-win-x64.zip `
            --title "Windows Shake to Find Cursor $tag" `
            --notes "Automated release for commit $env:GITHUB_SHA." `
            --target "$env:GITHUB_SHA"
