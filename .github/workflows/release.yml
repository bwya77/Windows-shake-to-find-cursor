name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      HAS_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version
        id: ver
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [xml]$props = Get-Content "Directory.Build.props"
          $version = ([string]$props.Project.PropertyGroup.Version).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "No <Version> found in Directory.Build.props"
            exit 1
          }

          $tag = "v$version-build.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building Windows Shake to Find Cursor $tag"
          exit 0

      - name: Publish win-x64
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          dotnet publish .\ShakeToBigCursor.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -p:Version=$v `
            -o publish\win-x64

      - name: Publish win-arm64
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          dotnet publish .\ShakeToBigCursor.csproj -c Release -r win-arm64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -p:Version=$v `
            -o publish\win-arm64

      - name: Sign binaries (Azure Trusted Signing)
        if: env.HAS_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build installers
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $iscc = (Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe","C:\Program Files\Inno Setup 6\ISCC.exe" -EA SilentlyContinue | Select-Object -First 1).FullName
          if (-not $iscc) {
            choco install innosetup --no-progress -y
            $iscc = (Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe","C:\Program Files\Inno Setup 6\ISCC.exe" -EA SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $iscc) {
            throw "ISCC (Inno Setup) not found"
          }

          foreach ($arch in 'x64','arm64') {
            & "$iscc" "/DAppVersion=$v" "/DArch=$arch" "/DSourceDir=$env:GITHUB_WORKSPACE\publish\win-$arch" "/O$env:GITHUB_WORKSPACE" "installer\WindowsShakeToFindCursor.iss"
            if ($LASTEXITCODE -ne 0) {
              throw "ISCC failed for $arch"
            }
          }

      - name: Sign installers (Azure Trusted Signing)
        if: env.HAS_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package portable zips
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          Compress-Archive -Path publish\win-x64\* -DestinationPath "WindowsShakeToFindCursor-$v-win-x64.zip" -Force
          Compress-Archive -Path publish\win-arm64\* -DestinationPath "WindowsShakeToFindCursor-$v-win-arm64.zip" -Force

      - name: Checksums
        shell: pwsh
        run: |
          Get-FileHash WindowsShakeToFindCursor-*.zip, WindowsShakeToFindCursorSetup-*.exe -Algorithm SHA256 |
            ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) } |
            Out-File -Encoding ascii SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            WindowsShakeToFindCursor-*.zip
            WindowsShakeToFindCursorSetup-*.exe

      - name: Stage provenance bundle
        shell: pwsh
        run: Copy-Item "${{ steps.attest.outputs.bundle-path }}" "WindowsShakeToFindCursor-${{ steps.ver.outputs.version }}.intoto.jsonl"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Windows Shake to Find Cursor ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            WindowsShakeToFindCursorSetup-*.exe
            WindowsShakeToFindCursor-*.zip
            SHA256SUMS.txt
            WindowsShakeToFindCursor-*.intoto.jsonl
